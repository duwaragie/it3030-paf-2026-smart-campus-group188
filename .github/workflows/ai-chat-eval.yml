name: AI Chat — LLM-as-Judge

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  ai-chat-eval:
    name: AI Chat Read-Only E2E + LLM Judge
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-campus-api

    env:
      # Chat runs on Groq (free tier); judge runs on OpenAI gpt-4o-mini (strict rubric grading).
      AI_PROVIDER: groq
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: meta-llama/llama-4-scout-17b-16e-instruct
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      JUDGE_MODEL: gpt-4o-mini
      # H2 is the test DB; these are just the placeholders required by the shared env-var plumbing.
      DB_USERNAME: sa
      DB_PASSWORD: password
      JWT_SECRET_KEY: dGVzdC1zZWNyZXQta2V5LWZvci1jaS1waXBlbGluZS0yNTYtYml0cw==
      GOOGLE_CLIENT_ID: test-client-id
      GOOGLE_CLIENT_SECRET: test-client-secret
      EMAIL_USERNAME: test@example.com
      EMAIL_PASSWORD: test-password
      SPRING_PROFILES_ACTIVE: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Guard — required secrets present
        run: |
          missing=""
          [ -z "${GROQ_API_KEY:-}" ] && missing="$missing GROQ_API_KEY"
          [ -z "${OPENAI_API_KEY:-}" ] && missing="$missing OPENAI_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing. Add them in repo Settings → Secrets → Actions."
            exit 1
          fi

      - name: Run AI judge test suite
        run: mvn -B test -Dtest=AiChatJudgeTest
        timeout-minutes: 15
