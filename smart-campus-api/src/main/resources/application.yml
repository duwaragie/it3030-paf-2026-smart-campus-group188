spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: smart-campus-api
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_campus
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration-ms: 900000  # 15 minutes
    refresh-expiration-ms: 604800000 # 7 days
  oauth2:
    redirect-uri: http://localhost:5173/oauth2/redirect
  frontend:
    url: http://localhost:5173
  push:
    # VAPID identity for browser Push subscriptions. If public/private are blank,
    # the backend generates a keypair on first start and persists it under
    # smart-campus-api/.vapid-keys.json (git-ignored) so subsequent boots reuse it.
    subject: mailto:smartcampus.team@gmail.com
    public-key: ${PUSH_VAPID_PUBLIC_KEY:}
    private-key: ${PUSH_VAPID_PRIVATE_KEY:}
  seed:
    admin-email: ${SEED_ADMIN_EMAIL:smartcampus.team@gmail.com}
    admin-password: ${SEED_ADMIN_PASSWORD:Admin@1234!}
    admin-name: ${SEED_ADMIN_NAME:Academic Curator Admin}
    admin-employee-id: ${SEED_ADMIN_EMPLOYEE_ID:EMP-0001}
  upload:
    tickets-dir: ./uploads/tickets
  ai:
    provider: ${AI_PROVIDER:openai}
    max-tool-iterations: 4
    request-timeout-ms: 30000
    groq:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai/v1
      model: ${GROQ_MODEL:meta-llama/llama-4-scout-17b-16e-instruct}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/v1
      model: ${OPENAI_MODEL:gpt-4o-mini}
